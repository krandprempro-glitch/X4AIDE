name: Build X4AIDE

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # تشغيل يدوي

jobs:
  build:
    name: Build X4AIDE APK
    runs-on: ubuntu-latest
    
    steps:
      # 1. استنساخ الكود (مع السجل الكامل)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # 2. إعداد Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      # 3. إعداد Gradle مع التخزين المؤقت
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}
      
      # 4. إعداد Android SDK
      - name: Setup Android SDK
        run: |
          mkdir -p $ANDROID_HOME
          cd $ANDROID_HOME
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
      
      # 5. تعيين متغيرات البيئة
      - name: Set environment variables
        run: |
          echo "ANDROID_HOME=${{ github.workspace }}/android-sdk" >> $GITHUB_ENV
          echo "PATH=$PATH:${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_ENV
      
      # 6. منح صلاحيات تنفيذ Gradle Wrapper
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      # 7. بناء APK (نسخة تصحيح الأخطاء)
      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace
      
      # 8. التحقق من وجود APK
      - name: Verify APK
        run: |
          if ls app/build/outputs/apk/debug/*.apk 1> /dev/null 2>&1; then
            echo "✅ APK built successfully"
            ls -la app/build/outputs/apk/debug/
          else
            echo "❌ APK not found!"
            exit 1
          fi
      
      # 9. رفع APK كأثر
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: X4AIDE-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
      
      # 10. إنشاء ملف checksums
      - name: Generate checksums
        run: |
          cd app/build/outputs/apk/debug
          sha256sum *.apk > SHA256SUMS.txt
          echo "## 📦 نتائج البناء" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **تم بناء X4AIDE بنجاح**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          cat SHA256SUMS.txt >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
