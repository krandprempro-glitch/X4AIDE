name: Build X4AIDE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04  # إصدار أقدم لدعم Java 7
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
      
      - name: Install Gradle 2.2
        run: |
          wget https://services.gradle.org/distributions/gradle-2.2-bin.zip
          unzip -q gradle-2.2-bin.zip
          sudo mv gradle-2.2 /opt/gradle
          echo "/opt/gradle/bin" >> $GITHUB_PATH
          gradle --version
      
      - name: Setup Android SDK (قديم)
        run: |
          mkdir -p $ANDROID_HOME
          cd $ANDROID_HOME
          wget -q https://dl.google.com/android/repository/sdk-tools-linux-4333796.zip
          unzip -q sdk-tools-linux-4333796.zip
          export PATH=$ANDROID_HOME/tools/bin:$PATH
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-23" "build-tools;23.0.3"
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
      
      - name: Set environment
        run: |
          echo "ANDROID_HOME=${{ github.workspace }}/android-sdk" >> $GITHUB_ENV
          echo "PATH=$PATH:${{ github.workspace }}/android-sdk/tools/bin" >> $GITHUB_ENV
      
      - name: Build APK
        run: gradle :app:assembleDebug --stacktrace --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: X4AIDE-debug
          path: app/build/outputs/apk/debug/*.apk
