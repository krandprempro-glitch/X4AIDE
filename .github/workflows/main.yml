name: Build X4AIDE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build X4AIDE APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Install Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-7.6-bin.zip
          unzip -q gradle-7.6-bin.zip
          sudo mv gradle-7.6 /opt/gradle
          echo "/opt/gradle/bin" >> $GITHUB_PATH
          gradle --version
      
      - name: Setup Android SDK
        run: |
          mkdir -p $ANDROID_HOME
          cd $ANDROID_HOME
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
      
      - name: Set environment variables
        run: |
          echo "ANDROID_HOME=${{ github.workspace }}/android-sdk" >> $GITHUB_ENV
          echo "PATH=$PATH:${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_ENV
      
      # عرض هيكل المشروع للتأكد
      - name: List project structure
        run: |
          echo "=== Project structure ==="
          ls -la
          echo "=== App directory ==="
          ls -la app/ || echo "app directory not found"
          echo "=== Build files ==="
          cat build.gradle | head -50 || echo "build.gradle not found"
      
      # محاولة بناء مع تفعيل الإخراج التفصيلي
      - name: Build APK with debug output
        run: |
          gradle :app:assembleDebug --stacktrace --info --no-daemon 2>&1 | tee build.log
      
      # عرض سجل البناء إذا فشل
      - name: Show build log on failure
        if: failure()
        run: |
          echo "=== Build log (last 200 lines) ==="
          tail -200 build.log
          echo "=== Error summary ==="
          grep -i "error\|failed\|exception" build.log | head -50 || echo "No errors found in log"
      
      - name: Verify APK
        if: success()
        run: |
          if ls app/build/outputs/apk/debug/*.apk 1> /dev/null 2>&1; then
            echo "✅ APK built successfully"
            ls -la app/build/outputs/apk/debug/
          else
            echo "❌ APK not found!"
            exit 1
          fi
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: X4AIDE-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
      
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
