name: Build X4AIDE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build X4AIDE APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      
      - name: Install Gradle 6.9
        run: |
          wget https://services.gradle.org/distributions/gradle-6.9-bin.zip
          unzip -q gradle-6.9-bin.zip
          sudo mv gradle-6.9 /opt/gradle
          echo "/opt/gradle/bin" >> $GITHUB_PATH
          gradle --version
      
      - name: Setup Android SDK
        run: |
          mkdir -p $ANDROID_HOME
          cd $ANDROID_HOME
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3"
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
      
      - name: Set environment variables
        run: |
          echo "ANDROID_HOME=${{ github.workspace }}/android-sdk" >> $GITHUB_ENV
          echo "PATH=$PATH:${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_ENV
      
      # 🔧 إصلاح build.gradle - إزالة jcenter
      - name: Fix build.gradle repositories
        run: |
          echo "=== Original build.gradle ==="
          cat build.gradle
          echo ""
          echo "=== Fixing repositories ==="
          
          # إنشاء build.gradle جديد
          cat > build.gradle << 'EOF'
// Top-level build file where you can add configuration options common to all sub-projects/modules.
buildscript {
    repositories {
        google()
        mavenCentral()
        maven { url "https://jitpack.io" }
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:3.6.4'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url "https://jitpack.io" }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
EOF
          
          echo "=== Fixed build.gradle ==="
          cat build.gradle
      
      # 🔧 إصلاح app/build.gradle إذا كان موجوداً
      - name: Fix app/build.gradle if needed
        run: |
          if [ -f app/build.gradle ]; then
            echo "Checking app/build.gradle..."
            # تأكد من وجود compileSdkVersion
            if ! grep -q "compileSdkVersion" app/build.gradle; then
              echo "Adding missing compileSdkVersion to app/build.gradle"
              sed -i '/android {/a\    compileSdkVersion 30\n    buildToolsVersion "30.0.3"' app/build.gradle
            fi
          fi
      
      - name: Build APK
        run: |
          gradle :app:assembleDebug --stacktrace --no-daemon
      
      - name: Verify APK
        run: |
          if [ -f app/build/outputs/apk/debug/*.apk ]; then
            echo "✅ APK built successfully"
            ls -la app/build/outputs/apk/debug/
          else
            echo "❌ APK not found!"
            find app/build -name "*.apk" 2>/dev/null || echo "No APK files found"
            exit 1
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: X4AIDE-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
